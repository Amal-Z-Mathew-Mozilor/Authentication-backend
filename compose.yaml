services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: postgres
      POSTGRES_DB: mydb
    ports:
      - "5434:5432"
    volumes:
      - db2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .                       # builds backend/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env                       # loads JWT / mail / ALLOWED_* / PORT secrets from your .env
    environment:
      # Override the host-oriented values from .env so the backend reaches the
      # postgres/redis CONTAINERS by their service names (not localhost).
      DATABASE_URL: postgres://postgres:admin@db:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db2_data:
