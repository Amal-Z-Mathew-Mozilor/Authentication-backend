openapi: 3.0.3
info:
  title: Pulse Authentication API
  version: 1.0.0
  description: >
    Authentication backend for Pulse. Covers signup, email verification (+ resend),
    login with IP/account lockout, logout, password reset (+ resend), change password,
    token rotation, and the authenticated profile endpoint.

    **Auth model:** on successful login / email verification / token rotation, the server
    sets two **httpOnly** cookies — `accessToken` and `refreshToken`. Protected endpoints
    read `accessToken` (and `rotateToken` reads `refreshToken`). All browser calls must send
    cookies (`credentials: "include"`).

    **Response envelope:** success responses use `{ statuscode, data, message, sucess }`
    (note: the success flag is spelled `sucess`). Error responses use
    `{ success: false, message, errors }`.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Authentication
  - name: Verification
  - name: Password Reset
  - name: Account
  - name: Websites
  - name: Cookie Policy
  - name: Images

paths:
  /pulse/users/signup:
    post:
      tags: [Authentication]
      summary: Register a new account
      description: >
        Creates a user, stores a single-use email-verification token, and emails a
        verification link built from the client-supplied `verifyBase` (validated against the
        server allowlist `ALLOWED_VERIFY_BASES`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, verifyBase]
              properties:
                email: { type: string, format: email, example: you@domain.com }
                password:
                  type: string
                  description: >
                    Min 12 chars, ≥1 uppercase, ≥1 lowercase, ≥1 number, ≥1 special char, no spaces.
                  example: Abcdefgh1!xx
                verifyBase:
                  type: string
                  description: Frontend base URL for the verify page; must be in ALLOWED_VERIFY_BASES.
                  example: http://localhost:5173/verify
      responses:
        '201':
          description: Account created; verification email sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 201, data: {}, message: "Account created successfully. Please verify your email.", sucess: true }
        '400':
          description: '`verifyBase` not allowed.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "invalid verify url", errors: [] }
        '409':
          description: Email already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "email already exist", errors: [] }
        '422':
          description: Validation failed (email/password policy).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  /pulse/users/verifyEmail/{token}:
    post:
      tags: [Verification]
      summary: Verify an email-verification token
      description: >
        Called by the frontend `/verify/:token` page. On success marks the email verified and
        sets the auth cookies (logs the user in). Returns JSON (no redirect).
      parameters:
        - $ref: '#/components/parameters/TokenPath'
      responses:
        '200':
          description: Verified. Sets `accessToken` and `refreshToken` cookies.
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookies' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "verified", sucess: true }
        '401':
          description: Token expired or already used.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                expired: { value: { success: false, message: "Token expired", errors: [] } }
                used: { value: { success: false, message: "token already used", errors: [] } }
        '403':
          description: Token not found / invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "Invalid Token", errors: [] }

  /pulse/users/resend/{token}:
    post:
      tags: [Verification]
      summary: Resend the email-verification link
      description: Resolves the (expired) verification token to its user and emails a fresh link.
      parameters:
        - $ref: '#/components/parameters/TokenPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verifyBase]
              properties:
                verifyBase: { type: string, example: http://localhost:5173/verify }
      responses:
        '200':
          description: A new verification email has been sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "A new verification email has been sent.", sucess: true }
        '400':
          description: '`verifyBase` not allowed, or user not found.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                badVerifyBase: { value: { success: false, message: "invalid verify url", errors: [] } }
                userNotFound: { value: { success: false, message: "user doesn't exist", errors: [] } }
        '403':
          description: Invalid token (not found).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "invalid token", errors: [] }
        '409':
          description: Email already verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "email already verified", errors: [] }

  /pulse/users/login:
    post:
      tags: [Authentication]
      summary: Log in
      description: >
        Validates the email, enforces a per-IP attempt limit (Redis) and a per-account lockout
        (5 failed attempts → locked ~2 min). On success sets the auth cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Logged in. Sets `accessToken` and `refreshToken` cookies.
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookies' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "login sucessfull", sucess: true }
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "Invalid credentials", errors: [] }
        '403':
          description: Email not verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "pls verify email", errors: [] }
        '422':
          description: Email validation failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }
        '429':
          description: >
            Throttled — either the per-IP attempt limit or a per-account lock (5 failed attempts →
            locked ~2 min). `errors.retryAfter` is seconds remaining.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RateLimitErrorResponse' }
              examples:
                ipLimit: { value: { success: false, message: "Too many login attempts.", errors: { retryAfter: 118 } } }
                accountLocked: { value: { success: false, message: "Account is locked. Too many failed attempts.", errors: { retryAfter: 120 } } }

  /pulse/users/logout:
    post:
      tags: [Authentication]
      summary: Log out
      description: Blacklists the access token, drops the refresh entry, and clears both cookies.
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Logged out. Clears the auth cookies.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "logout sucessful", sucess: true }
        '401':
          description: Missing/invalid token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /pulse/users/rotateToken:
    post:
      tags: [Authentication]
      summary: Rotate the access/refresh tokens
      description: Uses the `refreshToken` cookie to issue a new access + refresh pair.
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: Rotated. Sets new `accessToken` and `refreshToken` cookies.
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookies' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "token rotated sucessfully", sucess: true }
        '401':
          description: Refresh token missing or invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                missing: { value: { success: false, message: "Refresh token missing", errors: [] } }
                invalid: { value: { success: false, message: "invalid token", errors: [] } }

  /pulse/users/forgotPassword:
    post:
      tags: [Password Reset]
      summary: Request a password-reset email
      description: >
        Always responds 200 with a neutral message (no account-existence leak). If the email
        exists, emails a reset link built from `resetBase` (validated against `ALLOWED_RESET_BASES`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, resetBase]
              properties:
                email: { type: string, format: email }
                resetBase: { type: string, example: http://localhost:5173/resetPassword }
      responses:
        '200':
          description: Neutral acknowledgement (sent if the email exists).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "If the email exists, a reset link has been sent", sucess: true }
        '400':
          description: '`resetBase` not allowed.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "invalid reset url", errors: [] }
        '422':
          description: Email validation failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  /pulse/users/resetPassword/{token}/check:
    post:
      tags: [Password Reset]
      summary: Check whether a reset token is valid (read-only)
      description: >
        Runs the same token validation as the reset submit (expiry/used/not-found) but does NOT
        consume the token. The client calls this on page load to decide whether to show the reset
        form. Returns 200 when valid; 401/403 otherwise (same messages as the reset submit).
      parameters:
        - $ref: '#/components/parameters/TokenPath'
      responses:
        '200':
          description: Token is valid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "valid", sucess: true }
        '401':
          description: Token expired or already used.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                expired: { value: { success: false, message: "Token expired", errors: [] } }
                used: { value: { success: false, message: "token already is used", errors: [] } }
        '403':
          description: Token not found / invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "Invalid Token", errors: [] }

  /pulse/users/resetPassword/{token}:
    post:
      tags: [Password Reset]
      summary: Reset the password using a reset token
      description: >
        Token is validated first (expiry/used), then the password policy, then the controller
        checks (match, email matches account, not same as old).
      parameters:
        - $ref: '#/components/parameters/TokenPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, newPassword, confirmPassword]
              properties:
                email: { type: string, format: email }
                newPassword: { type: string }
                confirmPassword: { type: string }
      responses:
        '200':
          description: Password updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "password updated sucessfully", sucess: true }
        '400':
          description: Passwords don't match, same as old, email mismatch, or user not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                mismatch: { value: { success: false, message: "Passwords doesn't match", errors: [] } }
                sameAsOld: { value: { success: false, message: "password cannot be same as old password", errors: [] } }
                emailMismatch: { value: { success: false, message: "invalid credential", errors: [] } }
        '401':
          description: Token expired or already used.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                expired: { value: { success: false, message: "Token expired", errors: [] } }
                used: { value: { success: false, message: "token already is used", errors: [] } }
        '403':
          description: Token not found / invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "Invalid Token", errors: [] }
        '422':
          description: Password policy validation failed (per field).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  /pulse/users/resetResend/{token}:
    post:
      tags: [Password Reset]
      summary: Resend the password-reset link
      description: Resolves the (expired) reset token to its user and emails a fresh reset link.
      parameters:
        - $ref: '#/components/parameters/TokenPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetBase]
              properties:
                resetBase: { type: string, example: http://localhost:5173/resetPassword }
      responses:
        '200':
          description: A new password reset email has been sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "A new password reset email has been sent.", sucess: true }
        '400':
          description: '`resetBase` not allowed, or user not found.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                badResetBase: { value: { success: false, message: "invalid reset url", errors: [] } }
                userNotFound: { value: { success: false, message: "user doesn't exist", errors: [] } }
        '403':
          description: Invalid token (not found).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "invalid token", errors: [] }

  /pulse/users/changePassword:
    post:
      tags: [Account]
      summary: Change password (authenticated)
      description: Requires a valid `accessToken` cookie. Verifies the old password and policy.
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword, confirmPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
                confirmPassword: { type: string }
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "password reseted sucessfully", sucess: true }
        '400':
          description: Old password wrong, new≠confirm, or same as old.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                oldWrong: { value: { success: false, message: "old password doesnt match", errors: [] } }
                mismatch: { value: { success: false, message: "new and confirm password are wrong", errors: [] } }
                sameAsOld: { value: { success: false, message: "new password must not be same as old one", errors: [] } }
        '401':
          description: Not authenticated (missing/expired/invalid token).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "token revoked", errors: [] }
        '422':
          description: Password policy validation failed (per field).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  /pulse/users/me:
    post:
      tags: [Account]
      summary: Get the authenticated user
      description: Returns the current user's email (read from the access token). Requires the `accessToken` cookie.
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Authenticated. `data` is the user's email string.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { type: string, example: you@domain.com }
              example: { statuscode: 200, data: "you@domain.com", message: "user authenticated sucessfully", sucess: true }
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /pulse/websites:
    get:
      tags: [Websites]
      summary: List the current user's websites
      description: Returns all websites owned by the authenticated user, newest first.
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: The user's websites.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example:
                statuscode: 200
                data:
                  - { id: "b1c2…", name: "My site", url: "https://example.com", createdAt: "2026-07-08T10:00:00.000Z", updatedAt: "2026-07-08T10:00:00.000Z" }
                message: "websites fetched sucessfully"
                sucess: true
        '401':
          description: Not authenticated (missing/expired/invalid token).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "token revoked", errors: [] }
    post:
      tags: [Websites]
      summary: Add a website
      description: Registers a new website (name + URL) for the authenticated user.
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name: { type: string, maxLength: 255, example: My site }
                url: { type: string, format: uri, example: https://example.com }
      responses:
        '201':
          description: Website created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example:
                statuscode: 201
                data: { id: "b1c2…", name: "My site", url: "https://example.com", createdAt: "2026-07-08T10:00:00.000Z" }
                message: "website added sucessfully"
                sucess: true
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Validation failed (name/url).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  /pulse/websites/{id}:
    put:
      tags: [Websites]
      summary: Update a website
      description: Updates the name/URL of a website owned by the authenticated user.
      security:
        - accessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          description: The website id (uuid).
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name: { type: string, maxLength: 255 }
                url: { type: string, format: uri }
      responses:
        '200':
          description: Website updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: { id: "b1c2…", name: "New name", url: "https://example.com", updatedAt: "2026-07-08T10:05:00.000Z" }, message: "website updated sucessfully", sucess: true }
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Website not found (or not owned by the user).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "website not found", errors: [] }
        '422':
          description: Validation failed (name/url).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }
    delete:
      tags: [Websites]
      summary: Delete a website
      description: >
        Deletes a website owned by the authenticated user. Its associated cookie
        policy (once that feature exists) is removed via the FK cascade.
      security:
        - accessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          description: The website id (uuid).
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Website deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 200, data: {}, message: "website deleted sucessfully", sucess: true }
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Website not found (or not owned by the user).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "website not found", errors: [] }

  /pulse/websites/{websiteId}/cookie-policy:
    parameters:
      - name: websiteId
        in: path
        required: true
        description: The website id (uuid).
        schema: { type: string, format: uuid }
    get:
      tags: [Cookie Policy]
      summary: Get a website's cookie policy
      description: Returns the cookie-policy content for a website the user owns (empty object if none yet).
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: The cookie policy content.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example:
                statuscode: 200
                data: { content: { aboutCookies: { heading: "What are cookies?", description: "This Cookie Policy explains…" } } }
                message: "cookie policy fetched sucessfully"
                sucess: true
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Website not found (or not owned by the user).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "website not found", errors: [] }
    put:
      tags: [Cookie Policy]
      summary: Save the About cookies section
      description: Upserts the `aboutCookies` section of the website's cookie policy.
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                heading: { type: string, maxLength: 255, example: "What are cookies?" }
                description: { type: string, maxLength: 20000 }
      responses:
        '200':
          description: Saved; returns the updated content.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example:
                statuscode: 200
                data: { content: { aboutCookies: { heading: "What are cookies?", description: "…" } } }
                message: "cookie policy updated sucessfully"
                sucess: true
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Website not found (or not owned by the user).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Validation failed (heading/description length).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  /pulse/websites/{websiteId}/images:
    parameters:
      - name: websiteId
        in: path
        required: true
        description: The website id (uuid).
        schema: { type: string, format: uuid }
    post:
      tags: [Images]
      summary: Upload an image for a website's cookie policy
      description: >
        Uploads a PNG/JPG (multipart field `file`) stored in Postgres and attached to
        the website's cookie policy (the policy row is created if it doesn't exist yet).
        Returns the URL to embed. Requires ownership of the website.
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: PNG or JPG image }
      responses:
        '201':
          description: Image stored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
              example: { statuscode: 201, data: { url: "/pulse/images/b1c2…" }, message: "image uploaded sucessfully", sucess: true }
        '400':
          description: No file provided.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "file is required", errors: [] }
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Token revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Website not found (or not owned by the user).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "website not found", errors: [] }
        '415':
          description: Unsupported media type (only PNG/JPG allowed).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "Only PNG and JPG images are allowed", errors: [] }

  /pulse/images/{id}:
    get:
      tags: [Images]
      summary: Fetch an uploaded image
      description: Returns the raw image bytes by id. Public (unguessable UUID) so it renders in the editor and on public policy pages.
      parameters:
        - name: id
          in: path
          required: true
          description: The image id (uuid).
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The image binary.
          content:
            image/png: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
        '404':
          description: Image not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { success: false, message: "image not found", errors: [] }

components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: accessToken
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    TokenPath:
      name: token
      in: path
      required: true
      description: The raw (unhashed) token from the emailed link.
      schema: { type: string }

  headers:
    SetAuthCookies:
      description: Sets `accessToken` and `refreshToken` as httpOnly cookies.
      schema: { type: string }
      example: "accessToken=...; HttpOnly; Path=/, refreshToken=...; HttpOnly; Path=/"

  schemas:
    SuccessResponse:
      type: object
      description: Standard success envelope (note the success flag is spelled `sucess`).
      properties:
        statuscode: { type: integer, example: 200 }
        data: { description: Payload (object, or a string for /me). }
        message: { type: string }
        sucess: { type: boolean, example: true }

    ErrorResponse:
      type: object
      description: Standard error envelope from the global error handler.
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errors:
          description: Empty array for most errors; an array of field errors for 422.
          example: []
      required: [success, message]

    ValidationErrorResponse:
      type: object
      description: 422 from express-validator. `errors` lists each failed field.
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Invalid credential" }
        errors:
          type: array
          items:
            type: object
            properties:
              type: { type: string, example: field }
              value: { type: string }
              msg: { type: string, example: "Invalid email address" }
              path: { type: string, example: email }
              location: { type: string, example: body }
      example:
        success: false
        message: "Invalid credential"
        errors:
          - { type: field, value: "", msg: "Email is required", path: email, location: body }

    RateLimitErrorResponse:
      type: object
      description: 429 from the login middleware; `errors.retryAfter` is seconds remaining.
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Too many login attempts." }
        errors:
          type: object
          properties:
            retryAfter: { type: integer, example: 118 }
